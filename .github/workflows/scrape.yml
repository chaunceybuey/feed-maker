name: Scrape Feeds

on:
  schedule:
    - cron: "0 * * * *"   # every hour — change to "*/30 * * * *" for every 30 min
  workflow_dispatch:        # lets you trigger it manually from GitHub's UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated feeds
        run: |
          git config user.name  "Feed Forge Bot"
          git config user.email "bot@feedforge"
          git add feeds/
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "Update feeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
